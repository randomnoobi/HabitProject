# Publishes the interactive app at / and the marketing site at /website/.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Build Pages bundle (app + landing site)
        run: |
          set -e
          mkdir -p _pages/website
          cp index.html style.css app.js _pages/
          cp -r website/. _pages/website/
          touch _pages/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages
      - id: deployment
        uses: actions/deploy-pages@v4
